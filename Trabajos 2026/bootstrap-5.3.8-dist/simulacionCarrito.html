<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Vintage - Tu Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://media.discordapp.net/attachments/667862037988376577/1517309032015335596/b9aa205f-93cc-458b-b3b1-5ded1d5cac43.png?ex=6a35cfa7&is=6a347e27&hm=954e737c76ba66632b2a249a31f8b800621dff5c0f9b1334116ccd8933cb4831&=&format=webp&quality=lossless&width=648&height=648" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #ebd2bb 0%, #f5f5dc 100%);
            min-height: 100vh;
            font-family: serif;
            color: #55443b;
            padding: 6rem 1rem 3rem 1rem;
        }
        .vintage-wrapper {
            max-width: 700px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.75);
            border: 1px dashed rgba(160, 130, 110, 0.4);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .btn-vintage {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(160, 130, 110, 0.3);
            color: #3d2f26;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
        }
        [data-theme="pink"] {
            --bg-gradient: linear-gradient(135deg, #fbc5d8 0%, #ffeef2 100%);
            --text-color: #644b53;
            --title-color: #4a2834;
            --wrapper-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(224, 156, 178, 0.3);
            --accent-color: #d4889f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="vintage-wrapper">
            <h1 style="font-weight: 800; margin-bottom: 1.5rem;">Tu Carrito</h1>
            <p class="my-4 text-muted" style="font-style: italic;">Tu carrito está vacío actualmente. ¡Explora nuestro menú para añadir productos!</p>
            <a href="seccionCatalogo.html" class="btn-vintage mt-3">Volver al Catálogo</a>
        </div>
    </div>
    <script>
        if (localStorage.getItem('selected-theme') === 'pink') {
            document.documentElement.setAttribute('data-theme', 'pink');
        }
    </script>
</body>
</html>
