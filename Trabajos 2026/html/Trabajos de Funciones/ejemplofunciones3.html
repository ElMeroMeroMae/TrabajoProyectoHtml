<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btnSaludar">Saludar</button>
    <script>
        const saludarUsuario= (nombre) => {
            alert(`Hola, ${nombre}! Bienvenido a mi sitio web.`);
        }
        document.getElementById("btnSaludar").addEventListener("click", () => {
            saludarUsuario(prompt("¿Cuál es tu nombre?"));
        });
    </script>
</body>
</html>
